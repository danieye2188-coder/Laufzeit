<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaserFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>LaserFlow</h1>

    <div class="card">
        <h2>Neuer Auftrag</h2>

        <label>Baugruppe</label>
        <select id="baugruppe">
            <option>100.4162.02</option>
            <option>100.4451.01</option>
            <option>100.4706.00</option>
        </select>

        <label>Arbeitsgang</label>
        <select id="ag">
            <option>AG10</option>
            <option>AG20</option>
            <option>AG30</option>
            <option>AG40</option>
        </select>

        <button onclick="auftragStarten()">
            Auftrag starten
        </button>
    </div>

    <div class="card" id="produktion" style="display:none;">
        <h2>Produktion</h2>

        <p>Soll pro Stunde:</p>

        <h1 id="soll">0</h1>

        <label>Produzierte Menge</label>

        <input
            type="number"
            id="ist"
            placeholder="Menge eingeben">

        <button onclick="berechnen()">
            Speichern
        </button>

        <h2 id="ergebnis"></h2>
    </div>

    <script src="app.js"></script>

</body>
</html>
